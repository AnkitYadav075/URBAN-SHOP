<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Responsive Shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">URBAN<span>SHOP</span></div>
            <div class="nav-icons">
                <i class="fas fa-search"></i>
                <div class="cart-wrapper">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count">3</span>
                </div>
            </div>
        </nav>
    </header>

    <section class="hero">
        <h1>New Arrivals</h1>
        <p>Explore our latest collection of premium products.</p>
    </section>

    <main class="container">
        <div class="product-grid">
            
            <article class="product-card">
                <div class="image-container">
                    <img src="cookingitems.jpeg" alt="Cooking items">
                    <span class="badge sale">Sale</span>
                </div>
                <div class="details">
                    <p class="category">Cooking</p>
                    <h3>All items</h3>
                    <a href="items.html">
                        <button class="buy-btn">Click</button>
                    </a>
                </div>
            </article>

            <article class="product-card">
                <div class="image-container">
                    <img src="colddrink.jpeg">
                </div>
                <div class="details">
                    <p class="category">cold drinks</p>
                    <h3>Cold Drinks</h3>
                    <a>
                        <button class="buy-btn">Click</button>
                    </a>
                    
                </div>
            </article>

            <article class="product-card">
                <div class="image-container">
                    <img src="snacksandnamkeen.jpeg">
                    <span class="badge new">New</span>
                </div>
                <div class="details">
                    <p class="category">Snacksandnamkeen</p>
                    <h3>Snacksandnamkeen</h3>
                    <a href="items.html">
                        <button class="buy-btn">Click</button>
                    </a>
                </div>
            </article>


        </div>
    </main>

    <footer>
        <p>&copy; 2024 UrbanShop. All rights reserved.</p>
        <a>Made by: Ankit Yadav</a>
    </footer>

</body>
</html>
