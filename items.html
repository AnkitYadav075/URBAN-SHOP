<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My WhatsApp Shop</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styleitems.css">
    <style>
        /* Thodi extra styling inputs ke liye */
        .user-info {
            padding: 15px;
            border-top: 1px solid #ddd;
            background: #f9f9f9;
        }
        .user-info input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        #location-msg {
            font-size: 12px;
            margin-bottom: 10px;
            color: #d9534f; /* Red by default */
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">MY<span>SHOP</span></div>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fas fa-shopping-basket"></i>
            <span id="cart-count">0</span>
        </div>
    </header>

    <div class="searchbar">
        <input type="text" placeholder="Search Items...">
    </div>

    <main class="container">
        <h2 style="margin-bottom: 25px; text-align: center;">Hamari Latest Products</h2>
        <div class="product-grid">
            
            <div class="product-card">
                <img src="fanta.png" alt="product">
                <div class="details">
                    <h3>Fanta-Cold Drink</h3>
                    <p class="price">₹40</p>
                    <button class="add-btn" onclick="addToCart('Fanta-Cold Drink', 40)">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <img src="lays.png" alt="product">
                <div class="details">
                    <h3>Lays</h3>
                    <p class="price">₹10</p>
                    <button class="add-btn" onclick="addToCart('Lays', 10)">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <img src="sanickers.png" alt="product">
                <div class="details">
                    <h3>Snickers</h3>
                    <p class="price">₹10</p>
                    <button class="add-btn" onclick="addToCart('Snickers', 10)">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <img src="sprite.png" alt="product">
                <div class="details">
                    <h3>Sprite</h3>
                    <p class="price">₹40</p>
                    <button class="add-btn" onclick="addToCart('Sprite', 40)">Add to Cart</button>
                </div>
            </div>

        </div>
    </main>

    <div id="cart-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Aapka Cart</h3>
            <i class="fas fa-times" style="cursor:pointer" onclick="toggleCart()"></i>
        </div>
        
        <div id="cart-items"></div>

        <div class="user-info">
            <h4>Delivery Details</h4>
            <input type="text" id="user-name" placeholder="Apna Naam Likhein">
            <input type="text" id="user-address" placeholder="Pura Pata (Address) Likhein">
            <div id="location-msg">📍 GPS: Checking location...</div>
        </div>

        <div class="sidebar-footer">
            <div class="total-row">
                <span>Total:</span>
                <span id="cart-total">₹0</span>
            </div>
            <button class="checkout-btn" onclick="sendWhatsAppOrder()">
                <i class="fab fa-whatsapp"></i> Order on WhatsApp
            </button>
        </div>
    </div>

    <script src="javaitem.js"></script>
</body>
</html>
