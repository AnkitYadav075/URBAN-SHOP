<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My WhatsApp Shop</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">MY<span>SHOP</span></div>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fas fa-shopping-basket"></i>
            <span id="cart-count">0</span>
        </div>
    </header>

    <main class="container">
        <h2 style="margin-bottom: 25px; text-align: center;">Hamari Latest Products</h2>
        <div class="product-grid">
            
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" alt="Headphones">
                <div class="details">
                    <h3>Wireless Headphones</h3>
                    <p class="price">₹1,999</p>
                    <button class="add-btn" onclick="addToCart('Wireless Headphones', 1999)">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400" alt="Watch">
                <div class="details">
                    <h3>Smart Watch</h3>
                    <p class="price">₹2,499</p>
                    <button class="add-btn" onclick="addToCart('Smart Watch', 2499)">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400" alt="Glasses">
                <div class="details">
                    <h3>Sunglasses</h3>
                    <p class="price">₹799</p>
                    <button class="add-btn" onclick="addToCart('Sunglasses', 799)">Add to Cart</button>
                </div>
            </div>

        </div>
    </main>

    <div id="cart-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Aapka Cart</h3>
            <i class="fas fa-times" style="cursor:pointer" onclick="toggleCart()"></i>
        </div>
        <div id="cart-items"></div>
        <div class="sidebar-footer">
            <div class="total-row">
                <span>Total:</span>
                <span id="cart-total">₹0</span>
            </div>
            <button class="checkout-btn" onclick="sendWhatsAppOrder()">
                <i class="fab fa-whatsapp"></i> Order on WhatsApp
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
